api_platform:
    title: Recipi API
    description: API for the Recipi meal planning app
    version: 0.1.0
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    formats:
        jsonld:
            mime_types: ['application/ld+json']
        json:
            mime_types: ['application/json']
    docs_formats:
        jsonld:
            mime_types: ['application/ld+json']
        json:
            mime_types: ['application/json']
        html:
            mime_types: ['text/html']
    patch_formats:
        json:
            mime_types: ['application/merge-patch+json', 'application/json']
